# Maven Wrapper + pytest (same as test.bat / test.sh)
name: CI

on:
  push:
    branches: [JAVA版, main, master]
  pull_request:
    branches: [JAVA版, main, master]

jobs:
  java:
    name: Java (code_java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Maven test (wrapper)
        working-directory: code_java
        run: |
          chmod +x mvnw
          ./mvnw -B test

  python:
    name: Python (code/python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: code/python/requirements.txt
      - name: Install deps + pytest
        working-directory: code/python
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt pytest
      - name: pytest
        working-directory: code/python
        run: python -m pytest tests/ -q --tb=short
