# Maven Wrapper + pytest (same as test.bat / test.sh)
name: CI

on:
  push:
    branches: [JAVA版, main, master]
  pull_request:
    branches: [JAVA版, main, master]

jobs:
  java:
    name: Java (code_java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Maven test (wrapper)
        working-directory: code_java
        run: |
          chmod +x mvnw
          ./mvnw -B test

  python:
    name: Python (code/python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: code/python/requirements.txt
      - name: Install deps + pytest
        working-directory: code/python
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt pytest
      - name: pytest
        working-directory: code/python
        run: python -m pytest tests/ -q --tb=short

  stage2-headless-parity:
    name: Stage2 headless parity (JUnit runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Install Python 3.14 (deadsnakes)
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3.14 python3.14-venv python3.14-dev
      - name: pip install (planning_core)
        run: /usr/bin/python3.14 -m pip install --user -r "${GITHUB_WORKSPACE}/code/python/requirements.txt"
      - name: Maven Stage2HeadlessParityCiTest
        working-directory: code_java
        env:
          PM_AI_STAGE2_HEADLESS_CI: "1"
          PM_AI_PYTHON: /usr/bin/python3.14
        run: |
          chmod +x mvnw
          ./mvnw -B test -Dtest=Stage2HeadlessParityCiTest
